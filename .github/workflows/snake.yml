name: Generate Snake Animation

on:
  # roda automaticamente a cada 12 horas
  schedule:
    - cron: "0 */12 * * *"
  # permite rodar manualmente na aba Actions
  workflow_dispatch:
  # roda a cada push na main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#22c55e&color_dots=#0a0a0a,#163a23,#1f7a3d,#22c55e,#4ade80

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
